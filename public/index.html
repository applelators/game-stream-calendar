<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream Slate · Game Release Calendar</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><text y='14' font-size='14'>%F0%9F%8E%AE</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
    // calc.js + app.jsx are concatenated then Babel-transformed together so
    // app.jsx can reference calc helpers without a module system (no build step).
    Promise.all([
      fetch('calc.js').then(function (r) { return r.text(); }),
      fetch('app.jsx').then(function (r) { return r.text(); })
    ])
      .then(function (parts) {
        var src = parts[0] + '\n;\n' + parts[1];
        var code = Babel.transform(src, { presets: ['react'] }).code;
        (0, eval)(code);
        var root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
      })
      .catch(function (e) {
        console.error('Failed to load app:', e);
        document.getElementById('root').innerHTML =
          '<pre style="color:#f88;padding:24px;font-family:monospace">Failed to load app: ' + e + '</pre>';
      });
  </script>
</body>
</html>
