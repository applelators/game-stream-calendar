<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stream Slate · Cockpit</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  *{box-sizing:border-box;}
  body{margin:0;background:#0a0d14;color:#e8edf5;font-family:'DM Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
  button{cursor:pointer;font-family:inherit;border:0;}
  ::-webkit-scrollbar{width:9px;height:9px;}
  ::-webkit-scrollbar-thumb{background:#2b3548;border-radius:99px;}
  ::-webkit-scrollbar-track{background:#0a0d14;}
  @keyframes ssfade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
  @keyframes ssglow{0%,100%{opacity:.45;}50%{opacity:.72;}}
  .anim{animation:ssfade .4s ease both;}

  .app-bg{min-height:100vh;background:radial-gradient(1200px 620px at 72% -12%, #1a1530aa, transparent 60%), #0a0d14;}
  .wrap{max-width:1480px;margin:0 auto;padding:clamp(14px,2.2vw,26px) clamp(12px,2.2vw,30px) 90px;}

  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:clamp(16px,2.6vw,26px);}
  .brand{display:flex;align-items:center;gap:11px;}
  .logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#a970ff,#3b6fe0);display:grid;place-items:center;font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;color:#fff;box-shadow:0 6px 18px #a970ff44;}
  .brand-name{font-family:'Space Grotesk';font-weight:700;font-size:1.18rem;letter-spacing:-.01em;line-height:1;}
  .brand-sub{font-size:.7rem;color:#5c6678;font-family:'JetBrains Mono';margin-top:3px;}
  .spacer{flex:1;}
  .nav{display:inline-flex;background:#10141d;border:1px solid #283245;border-radius:99px;padding:3px;}
  .nav button{padding:7px 17px;border-radius:99px;font-size:.82rem;font-weight:700;background:transparent;color:#8b97ab;transition:.12s;}
  .nav button.on{background:#a970ff;color:#160a2b;}
  .toggle{border:1px solid #283245;background:#10141d;color:#e8edf5;padding:7px 14px;border-radius:99px;font-size:.78rem;font-weight:600;display:inline-flex;align-items:center;gap:8px;transition:.12s;}
  .toggle.bold{border-color:#a970ff;background:#1b1430;}
  .toggle .dot{width:8px;height:8px;border-radius:99px;background:#5c6678;}
  .toggle.bold .dot{background:#a970ff;box-shadow:0 0 8px #a970ff;}

  .healthbar{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:16px;}
  .health-pill{display:inline-flex;align-items:center;gap:8px;background:#13201a;border:1px solid #1f3a2c;border-radius:99px;padding:6px 13px;}
  .health-pill .pulse{width:8px;height:8px;border-radius:99px;background:#34d399;box-shadow:0 0 8px #34d399;}
  .health-pill b{font-size:.8rem;font-weight:700;color:#34d399;}
  .health-detail{font-size:.8rem;color:#8b97ab;}
  .pace{font-size:.72rem;color:#5c6678;font-family:'JetBrains Mono';}

  .hero-grid{display:grid;gap:16px;grid-template-columns:1.42fr 1fr;align-items:stretch;}
  .panel{position:relative;border-radius:18px;border:1px solid #283245;background:linear-gradient(180deg,#141a26,#0f131c);padding:clamp(16px,2vw,22px);overflow:hidden;}
  .eyebrow{display:flex;align-items:center;gap:8px;font-size:.7rem;font-weight:700;letter-spacing:.14em;font-family:'JetBrains Mono';}
  .live-dot{width:7px;height:7px;border-radius:99px;background:#f87171;box-shadow:0 0 8px #f87171;}

  .hero-blur{position:absolute;inset:-50px;background-size:cover;background-position:center;filter:blur(46px) saturate(1.5);opacity:.4;}
  .hero-glowlayer{position:absolute;inset:0;animation:ssglow 4s ease-in-out infinite;}
  .hero-veil{position:absolute;inset:0;background:linear-gradient(180deg,#0e131caa,#0e131ce6);}

  .np-cards{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:13px;position:relative;}
  .np-card{background:#0d1320;border:1px solid #283245;border-radius:14px;padding:13px;display:flex;flex-direction:column;gap:11px;}
  .np-top{display:flex;gap:12px;align-items:flex-start;}
  .np-art{position:relative;width:62px;height:62px;border-radius:10px;overflow:hidden;flex:none;background:#0e1320 center/cover;box-shadow:0 3px 12px #0008;}
  .np-title{font-family:'Space Grotesk';font-weight:600;font-size:.92rem;line-height:1.18;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .np-status{display:inline-flex;align-items:center;gap:5px;margin-top:6px;border-radius:99px;padding:2px 9px;font-size:.66rem;font-weight:700;}
  .np-prog{display:flex;align-items:center;gap:12px;}
  .ring{width:46px;height:46px;border-radius:50%;display:grid;place-items:center;flex:none;}
  .ring-inner{width:34px;height:34px;border-radius:50%;background:#0d1320;display:grid;place-items:center;font-family:'JetBrains Mono';font-size:.62rem;font-weight:700;}
  .np-done{font-size:.74rem;color:#e8edf5;font-weight:600;}
  .np-left{font-size:.66rem;color:#5c6678;font-family:'JetBrains Mono';margin-top:2px;}
  .goal{font-size:.72rem;color:#8b97ab;line-height:1.4;border-top:1px solid #1b2433;padding-top:9px;cursor:pointer;}
  .goal .lbl{color:#5c6678;font-weight:700;font-family:'JetBrains Mono';font-size:.62rem;letter-spacing:.04em;}
  .spoiler{background:#444b59;color:#444b59;border-radius:4px;padding:0 3px;filter:blur(4px);transition:.15s;}
  .spoiler.show{background:#ffffff10;color:#cdd3df;filter:none;}

  .cd-head{display:flex;align-items:center;gap:9px;}
  .cd-head b{font-size:.7rem;font-weight:700;letter-spacing:.14em;color:#9fb4d8;font-family:'JetBrains Mono';}
  .cd-game{display:flex;gap:13px;align-items:center;margin-top:14px;position:relative;}
  .cd-gameart{position:relative;width:58px;height:58px;border-radius:11px;overflow:hidden;flex:none;background:#0e1320 center/cover;box-shadow:0 4px 16px #0009;}
  .cd-gametitle{font-family:'Space Grotesk';font-weight:700;font-size:1.02rem;line-height:1.15;}
  .cd-gamedate{font-size:.74rem;color:#9fb4d8;margin-top:4px;}
  .cd-grid{display:flex;gap:8px;margin-top:18px;position:relative;}
  .cd-cell{flex:1;text-align:center;background:#0c111b;border:1px solid #243049;border-radius:12px;padding:12px 4px;}
  .cd-num{font-family:'Space Grotesk';font-weight:700;font-size:clamp(1.5rem,3.2vw,2.1rem);line-height:1;color:#eaf1ff;}
  .cd-lbl{font-size:.6rem;color:#5c6678;font-family:'JetBrains Mono';letter-spacing:.1em;margin-top:6px;}
  .upnext-h{font-size:.66rem;font-weight:700;letter-spacing:.12em;color:#5c6678;font-family:'JetBrains Mono';margin:20px 0 4px;}
  .un-row{display:flex;align-items:center;gap:10px;padding:7px 0;border-top:1px solid #1b2433;}
  .un-art{width:32px;height:32px;border-radius:7px;flex:none;background:#0e1320 center/cover;box-shadow:0 1px 5px #0007;}
  .un-title{font-size:.78rem;font-weight:600;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .un-meta{font-size:.66rem;color:#5c6678;font-family:'JetBrains Mono';margin-top:2px;}
  .un-dot{width:8px;height:8px;border-radius:99px;flex:none;}

  .month{margin-top:clamp(18px,2.6vw,26px);border:1px solid #283245;border-radius:18px;background:#10141d;overflow:hidden;}
  .m-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 18px;border-bottom:1px solid #1b2433;background:#131927;flex-wrap:wrap;}
  .m-head h2{font-family:'Space Grotesk';font-weight:700;font-size:1.15rem;margin:0;}
  .m-legend{display:flex;align-items:center;gap:14px;font-size:.7rem;color:#8b97ab;font-family:'JetBrains Mono';flex-wrap:wrap;}
  .m-legend span{display:inline-flex;align-items:center;gap:6px;}
  .m-week{display:grid;grid-template-columns:repeat(7,1fr);padding:10px 10px 0;}
  .m-week span{padding-left:4px;font-size:.62rem;letter-spacing:.09em;color:#5c6678;font-weight:700;}
  .m-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;padding:8px 10px 14px;}
  .m-cell{position:relative;aspect-ratio:1/1;border-radius:10px;overflow:hidden;background:#0d121c;border:1px solid #1b2433;}
  .m-cell.pad{background:#0a0d14;border-color:#0a0d14;}
  .m-cell.today{background:#19142b;border-color:#a970ff;}
  .m-art{position:absolute;inset:0;background:#0e1320 center/cover;}
  .m-grad{position:absolute;inset:0;background:linear-gradient(180deg,#0a0d1420 28%,#0a0d14e8);}
  .m-day{position:absolute;top:5px;left:7px;font-family:'JetBrains Mono';font-size:.64rem;font-weight:700;color:#fff;text-shadow:0 1px 3px #000;}
  .m-day.plain{color:#8b97ab;text-shadow:none;}
  .m-day.todaynum{color:#cdb6ff;}
  .m-day.streamednum{color:#34d399;}
  .m-badge{position:absolute;top:5px;right:6px;font-family:'JetBrains Mono';font-size:.56rem;font-weight:700;color:#0c0c12;border-radius:4px;padding:0 4px;}
  .m-foot{position:absolute;left:6px;right:6px;bottom:5px;}
  .m-title{font-size:.6rem;font-weight:700;color:#fff;line-height:1.12;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-shadow:0 1px 3px #000;}
  .m-hrs{font-size:.55rem;color:#c9d2e0;font-family:'JetBrains Mono';margin-top:1px;text-shadow:0 1px 2px #000;}
  .m-moon{position:absolute;inset:0;display:grid;place-items:center;font-size:1.1rem;opacity:.85;}
  .m-evelbl{position:absolute;left:6px;right:6px;bottom:5px;font-size:.5rem;color:#9fb4d8;font-family:'JetBrains Mono';text-align:center;}
  .m-check{position:absolute;inset:0;display:grid;place-items:center;color:#34d399;opacity:.4;font-size:1rem;font-weight:800;}

  .w-head{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;margin-bottom:6px;}
  .w-head h1{font-family:'Space Grotesk';font-weight:700;font-size:clamp(1.4rem,3vw,2rem);letter-spacing:-.01em;margin:0;}
  .w-head span{font-size:.8rem;color:#8b97ab;}
  .w-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:16px 0 22px;}
  .w-stat{background:linear-gradient(180deg,#141a26,#0f131c);border:1px solid #283245;border-radius:16px;padding:clamp(14px,1.6vw,20px);}
  .w-stat .big{font-family:'Space Grotesk';font-weight:700;font-size:clamp(1.7rem,3.4vw,2.5rem);line-height:1;}
  .w-stat .lbl{font-size:.78rem;font-weight:600;color:#e8edf5;margin-top:8px;}
  .w-stat .sub{font-size:.68rem;color:#5c6678;margin-top:3px;line-height:1.3;}
  .w-panel{background:#10141d;border:1px solid #283245;border-radius:16px;padding:clamp(16px,2vw,22px);}
  .w-panel h3{font-family:'Space Grotesk';font-weight:700;font-size:1.05rem;margin:0 0 4px;}
  .w-panel .desc{font-size:.72rem;color:#5c6678;margin-bottom:16px;}
  .w-row{display:flex;align-items:center;gap:12px;margin-bottom:13px;}
  .w-rowart{width:38px;height:38px;border-radius:8px;flex:none;background:#0e1320 center/cover;box-shadow:0 2px 8px #0007;}
  .w-rowtitle{font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .w-bar{height:7px;border-radius:99px;background:#0c111b;margin-top:6px;overflow:hidden;}
  .w-bar > div{height:100%;border-radius:99px;}
  .w-hours{font-family:'JetBrains Mono';font-size:.82rem;font-weight:700;flex:none;}
  .w-mara{display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid #1b2433;}
  .w-maraart{width:40px;height:40px;border-radius:8px;flex:none;background:#0e1320 center/cover;box-shadow:0 2px 8px #0007;}
  .w-maracount{font-family:'Space Grotesk';font-weight:700;font-size:1.25rem;line-height:1;}
  .w-platrow{display:flex;align-items:center;gap:12px;margin-bottom:11px;}
  .w-platname{width:84px;flex:none;font-size:.76rem;color:#c9d2e0;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .w-platbar{flex:1;height:9px;border-radius:99px;background:#0c111b;overflow:hidden;}
  .w-platcount{width:26px;text-align:right;font-family:'JetBrains Mono';font-size:.74rem;font-weight:700;color:#8b97ab;flex:none;}
  .w-basisrow{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
  .w-note{margin-top:16px;padding-top:14px;border-top:1px solid #1b2433;font-size:.74rem;color:#8b97ab;line-height:1.5;}

  .month.boldcal .m-head{background:linear-gradient(90deg,#1b1430,#131927);}

  /* expanded calendar */
  .cal{border:1px solid #283245;border-radius:18px;background:#10141d;overflow:hidden;}
  .cal.boldcal .cal-bar{background:linear-gradient(90deg,#1b1430,#131927);}
  .cal-bar{display:flex;align-items:center;gap:12px;padding:13px 16px;border-bottom:1px solid #1b2433;background:#131927;flex-wrap:wrap;}
  .cal-nav{display:inline-flex;gap:5px;}
  .cal-nav button{width:34px;height:34px;border-radius:9px;border:1px solid #283245;background:#10141d;color:#9fb4d8;font-size:1.05rem;line-height:1;transition:.12s;}
  .cal-nav button:hover{background:#1a2130;color:#fff;border-color:#34415a;}
  .cal-title{font-family:'Space Grotesk';font-weight:700;font-size:1.25rem;letter-spacing:-.01em;min-width:170px;}
  .cal-todaybtn{border:1px solid #283245;background:#10141d;color:#e8edf5;border-radius:9px;padding:7px 14px;font-size:.78rem;font-weight:600;transition:.12s;}
  .cal-todaybtn:hover{background:#1a2130;border-color:#34415a;}
  .cal-cnt{margin-left:auto;font-size:.72rem;color:#5c6678;font-family:'JetBrains Mono';}
  .cal-planned{display:flex;flex-wrap:wrap;gap:7px;align-items:center;padding:9px 16px;border-bottom:1px solid #1b2433;background:#0f1420;}
  .cal-planned-h{font-size:.62rem;letter-spacing:.05em;text-transform:uppercase;color:#5c6678;font-family:'JetBrains Mono';margin-right:2px;}
  .cal-pchip{display:inline-flex;align-items:center;gap:6px;border:1px dashed #2c3a52;border-radius:99px;padding:3px 11px;font-size:.74rem;font-weight:600;color:#c9d2e0;}
  .cal-pdot{width:8px;height:8px;border-radius:99px;flex:none;}
  .cal-week{display:grid;grid-template-columns:repeat(7,1fr);background:#0f1420;border-bottom:1px solid #1b2433;}
  .cal-week span{padding:8px 12px;font-size:.64rem;letter-spacing:.09em;color:#5c6678;font-weight:700;}
  .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:120px;}
  .cal-cell{position:relative;border-right:1px solid #161d2a;border-bottom:1px solid #161d2a;padding:6px 7px;display:flex;flex-direction:column;gap:4px;overflow:hidden;}
  .cal-cell:nth-child(7n){border-right:0;}
  .cal-cell.pad{background:#0b0f18;}
  .cal-cell.today{background:#140f24;}
  .cal-dnum{align-self:flex-start;font-family:'JetBrains Mono';font-size:.76rem;font-weight:700;color:#c9d2e0;padding:1px 2px;}
  .cal-cell.today .cal-dnum{background:#a970ff;color:#160a2b;border-radius:99px;min-width:22px;height:22px;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;}
  .cal-moon{position:absolute;top:6px;right:8px;font-size:.85rem;opacity:.82;}
  .cal-rel{display:flex;align-items:center;gap:5px;border-radius:6px;padding:2px 6px;font-size:.64rem;font-weight:700;color:#0c0c12;}
  .cal-relart{width:15px;height:15px;border-radius:3px;background:#0e1320 center/cover;flex:none;box-shadow:0 1px 2px #0007;}
  .cal-reltitle{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cal-play{margin-top:auto;position:relative;border-radius:8px;overflow:hidden;min-height:34px;display:flex;align-items:center;gap:7px;padding:5px 7px;}
  .cal-playart{position:absolute;inset:0;background:#0e1320 center/cover;}
  .cal-playgrad{position:absolute;inset:0;background:linear-gradient(90deg,#0a0d14d8,#0a0d1488);}
  .cal-playtitle{position:relative;font-size:.62rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-shadow:0 1px 2px #000;}
  .cal-playno{position:relative;font-family:'JetBrains Mono';font-size:.56rem;font-weight:700;color:#0c0c12;border-radius:4px;padding:0 4px;flex:none;}

  /* share cards */
  .share-stage{display:flex;flex-wrap:wrap;gap:26px;align-items:flex-start;margin-top:18px;}
  .share-col{display:flex;flex-direction:column;gap:10px;}
  .share-cap{font-size:.72rem;color:#5c6678;font-family:'JetBrains Mono';}
  .card-v{width:340px;border-radius:20px;overflow:hidden;background:linear-gradient(180deg,#141a26,#0b0f18);border:1px solid #283245;box-shadow:0 24px 60px #0009;}
  .cardv-top{position:relative;display:flex;align-items:center;justify-content:space-between;padding:16px 18px;background:linear-gradient(120deg,#a970ff,#3b6fe0);}
  .cardv-brandname{font-family:'Space Grotesk';font-weight:700;font-size:.95rem;color:#fff;line-height:1;}
  .cardv-brandsub{font-size:.66rem;color:#ffffffcc;font-family:'JetBrains Mono';margin-top:3px;}
  .cardv-tag{font-size:.6rem;font-weight:700;letter-spacing:.12em;color:#ffffffe0;font-family:'JetBrains Mono';}
  .cardv-next{display:flex;gap:13px;align-items:center;padding:18px;}
  .cardv-nextart{width:66px;height:66px;border-radius:12px;background:#0e1320 center/cover;flex:none;box-shadow:0 6px 18px #000a;}
  .cardv-eyebrow{font-size:.6rem;font-weight:700;letter-spacing:.1em;color:#9fb4d8;font-family:'JetBrains Mono';}
  .cardv-title{font-family:'Space Grotesk';font-weight:700;font-size:1.1rem;line-height:1.12;margin-top:5px;}
  .cardv-date{font-size:.72rem;color:#cdb6ff;font-family:'JetBrains Mono';margin-top:5px;}
  .cardv-list{padding:4px 18px 6px;}
  .cardv-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-top:1px solid #1b2433;}
  .cardv-chip{font-family:'JetBrains Mono';font-size:.6rem;font-weight:700;color:#9fb4d8;background:#0c111b;border:1px solid #243049;border-radius:5px;padding:3px 5px;width:54px;text-align:center;flex:none;}
  .cardv-rowart{width:30px;height:30px;border-radius:6px;background:#0e1320 center/cover;flex:none;box-shadow:0 1px 4px #0007;}
  .cardv-rowtitle{flex:1;min-width:0;font-size:.78rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .cardv-rowstr{font-family:'JetBrains Mono';font-size:.62rem;color:#5c6678;flex:none;}
  .cardv-foot{padding:13px 18px;background:#0b0f18;border-top:1px solid #1b2433;font-size:.64rem;color:#5c6678;font-family:'JetBrains Mono';text-align:center;}
  .card-w{width:680px;max-width:100%;display:flex;border-radius:20px;overflow:hidden;background:linear-gradient(180deg,#141a26,#0b0f18);border:1px solid #283245;box-shadow:0 24px 60px #0009;}
  .cardw-left{position:relative;width:300px;flex:none;min-height:300px;}
  .cardw-leftart{position:absolute;inset:0;background:#0e1320 center/cover;}
  .cardw-leftveil{position:absolute;inset:0;background:linear-gradient(180deg,#0a0d1420,#0a0d14f2);}
  .cardw-leftbody{position:absolute;left:0;right:0;bottom:0;padding:20px;}
  .cardw-eyebrow{font-size:.62rem;font-weight:700;letter-spacing:.12em;color:#cdb6ff;font-family:'JetBrains Mono';}
  .cardw-title{font-family:'Space Grotesk';font-weight:700;font-size:1.5rem;line-height:1.08;margin-top:7px;text-shadow:0 2px 8px #000;}
  .cardw-date{font-size:.78rem;color:#e8edf5;font-family:'JetBrains Mono';margin-top:8px;}
  .cardw-right{flex:1;min-width:0;display:flex;flex-direction:column;padding:18px 20px;}
  .cardw-brand{display:flex;align-items:center;gap:9px;margin-bottom:10px;}
  .cardw-foot{margin-top:auto;font-size:.64rem;color:#5c6678;font-family:'JetBrains Mono';padding-top:12px;border-top:1px solid #1b2433;}

  /* tonight picker */
  .tonight{border:1px solid #283245;background:linear-gradient(180deg,#141a26,#0f131c);border-radius:18px;padding:clamp(15px,2vw,20px);margin-bottom:16px;}
  .tonight-head{display:flex;align-items:baseline;gap:10px;margin-bottom:13px;flex-wrap:wrap;}
  .tonight-h{font-family:'Space Grotesk';font-weight:700;font-size:1.08rem;}
  .tonight-date{font-size:.72rem;color:#8b97ab;font-family:'JetBrains Mono';}
  .tonight-note{margin-left:auto;font-size:.66rem;color:#5c6678;font-family:'JetBrains Mono';letter-spacing:.02em;}
  .tonight-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;}

<script type="text/babel" data-presets="react">
const {useState,useEffect} = React;

function byId(id){ return GAMES.find(g => g.id === id) || {}; }
function anchor(s){
  if(!s) return null; let m;
  if(m=/^(\d{4})-(\d{2})-(\d{2})$/.exec(s)) return new Date(+m[1],+m[2]-1,+m[3]);
  if(m=/^(\d{4})-(\d{2})$/.exec(s)) return new Date(+m[1],+m[2]-1,1);
  if(m=/^(\d{4})-Q(\d)$/.exec(s)) return new Date(+m[1],(+m[2]-1)*3,1);
  if(m=/(spring|summer|fall|autumn|holiday|winter)\s*(\d{4})/i.exec(s)){ const mp={spring:2,summer:5,fall:8,autumn:8,holiday:10,winter:11}; return new Date(+m[2],mp[m[1].toLowerCase()],1); }
  if(m=/([A-Za-z]{3,9})\s+(\d{4})/.exec(s)){ const mi=['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'].indexOf(m[1].slice(0,3).toLowerCase()); if(mi>=0) return new Date(+m[2],mi,1); }
  if(m=/^(\d{4})$/.exec(s)) return new Date(+m[1],11,31);
  return null;
}
function shortDate(g){
  if(/^\d{4}-\d{2}-\d{2}$/.test(g.date)){ const d=anchor(g.date); return MO[d.getMonth()]+' '+d.getDate(); }
  if(/^\d{4}-\d{2}$/.test(g.date)){ const d=anchor(g.date); return MO[d.getMonth()]; }
  return g.dateLabel || g.date;
}
function goalParts(pg){
  if(!pg) return null;
  const m=/\|\|(.+?)\|\|/.exec(pg);

  return {pre: pg.replace(/\|\|.+?\|\|/,'').replace(/\s*[\u2014\-:]?\s*\.?\s*$/,'').trim(), secret:m[1]};
}

  const firstDow=new Date(2026,5,1).getDay();
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push({pad:true});
  for(let d=1;d<=30;d++){
    const p=plan[d];
    if(p&&p.gid){ const g=byId(p.gid); cells.push({day:d,stream:true,id:g.id,art:g.icon||'',color:g.color||ACCENT,title:g.title||'',label:p.no,hrs:p.hrs,today:d===TODAY}); }

    {value:String(playable.length),label:'titles on the slate',sub:'games, remakes, DLC & marathons',color:'#a970ff'},

  ];
  const top=GAMES.filter(g=>g.hours>0).slice().sort((a,b)=>b.hours-a.hours).slice(0,5);
  const maxH=top.length?top[0].hours:1;
  const topRows=top.map((g,i)=>({title:g.title,art:g.icon||'',hours:g.hours+'h',pct:Math.round((g.hours/maxH)*100)+'%',color:g.color||PALETTE[i%PALETTE.length]}));
  const groups=[

  ];
  const marathons=groups.map(gr=>{
    const items=GAMES.filter(g=>gr.match.test(g.title));
    const hrs=items.reduce((a,g)=>a+(g.hours||0),0);
    const str=items.reduce((a,g)=>a+(g.streams||0),0);
    return {name:gr.name,count:items.length,color:gr.color,art:(items.find(g=>g.icon)||{}).icon||'',sub:hrs+'h · '+str+' streams'};
  }).filter(m=>m.count>1).sort((a,b)=>b.count-a.count);
  const pc={};
  GAMES.forEach(g=>(g.platforms||[]).forEach(p=>{pc[p]=(pc[p]||0)+1;}));
  const plats=Object.keys(pc).map(k=>({name:k,count:pc[k]})).sort((a,b)=>b.count-a.count).slice(0,6);
  const maxP=plats.length?plats[0].count:1;

  const yrs=weeks/52;
  return {big,top:topRows,marathons,platforms,basis,allWeeks:Math.round(weeks)+' weeks',allYears:yrs>=1?yrs.toFixed(1)+' years':Math.round(weeks/4.345)+' months'};
}

const MO_LONG=['January','February','March','April','May','June','July','August','September','October','November','December'];
function buildCalendar(year,month){
  const firstDow=new Date(year,month,1).getDay();
  const daysIn=new Date(year,month+1,0).getDate();
  const byDay={};
  GAMES.forEach(g=>{
    if(/^\d{4}-\d{2}-\d{2}$/.test(g.date)){
      const dd=anchor(g.date);
      if(dd.getFullYear()===year&&dd.getMonth()===month){(byDay[dd.getDate()]=byDay[dd.getDate()]||[]).push(g);}
    }
  });
  const planJun={
    23:{gid:'pok-mon-heartgold',no:'3/5'},24:{launch:true},
    25:{gid:'star-fox-switch-2',no:'1/2'},26:{gid:'star-fox-switch-2',no:'2/2'},
    27:{gid:'xenoblade-chronicles-definitive-edition-ns2-pt-1',no:'4/5'},
    28:{gid:'pok-mon-heartgold',no:'4/5'},29:{gid:'pok-mon-heartgold',no:'5/5'},
    30:{gid:'xenoblade-chronicles-definitive-edition-ns2-pt-1',no:'5/5'},
  };
  const plan=(year===2026&&month===5)?planJun:{};
  const cells=[];
  for(let i=0;i<firstDow;i++) cells.push({pad:true});
  for(let d=1;d<=daysIn;d++){
    const rels=(byDay[d]||[]).map(g=>({id:g.id,title:g.title,art:g.icon||'',color:g.color||ACCENT,kind:g.kind}));
    const p=plan[d];
    const pg=p&&p.gid?byId(p.gid):null;
    cells.push({day:d,today:(year===2026&&month===5&&d===23),
      rels,launch:!!(p&&p.launch),play:pg?{id:pg.id,title:pg.title,art:pg.icon||'',color:pg.color||ACCENT,no:p.no}:null});
  }
  while(cells.length%7!==0) cells.push({pad:true});
  const planned=GAMES.filter(g=>/^\d{4}-\d{2}$/.test(g.date)&&g.kind!=='event'&&!g.bonus)
    .map(g=>({g,a:anchor(g.date)})).filter(x=>x.a&&x.a.getFullYear()===year&&x.a.getMonth()===month)
    .map(x=>({id:x.g.id,title:x.g.title,color:x.g.color||ACCENT}));
  const relCount=Object.keys(byDay).reduce((a,k)=>a+byDay[k].length,0);
  return {cells,planned,label:MO_LONG[month]+' '+year,relCount};
}

function resolveDeadline(fb){
  if(!fb) return null;
  const g=byId(fb);
  if(g&&g.title&&g.date){ const a=anchor(g.date); if(a) return a; }
  return anchor(fb);
}
function dlLabel(fb,dl){
  const g=byId(fb);
  if(g&&g.title) return 'before '+g.title.split(' — ')[0].split(':')[0].trim();
  if(/^\d{4}-\d{2}$/.test(fb)) return 'by end of '+MO[dl.getMonth()];
  return 'by '+MO[dl.getMonth()]+' '+dl.getDate();
}
function buildDeadlines(){
  const TD=new Date(2026,5,23);
  const groups={};
  GAMES.forEach(g=>{ if(g.finishBefore&&g.kind!=='event'){ (groups[g.finishBefore]=groups[g.finishBefore]||[]).push(g); } });
  const out=[];
  Object.keys(groups).forEach(fb=>{
    const items=groups[fb]; const dl=resolveDeadline(fb);
    if(!dl||dl<=TD) return;
    const hours=items.reduce((a,g)=>a+(g.hours||0),0); if(hours<=0) return;
    const weeksLeft=Math.max(0.3,(dl-TD)/6048e5);
    const needed=hours/weeksLeft; const lead=items[0];
    const tone=needed<=11.52?'#34d399':(needed<=11.52*1.4?'#f5b14c':'#f87171');
    out.push({id:lead.id,label:lead.title,count:items.length,hours,needed,onTrack:needed<=11.52,tone,
      fill:Math.min(100,needed/11.52*60),dlText:dlLabel(fb,dl)});
  });
  return out.sort((a,b)=>b.needed-a.needed);
}
function buildICS(items){
  const pad=n=>String(n).padStart(2,'0');
  const fmt=d=>d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate());
  let s='BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//Stream Slate//nabunan//EN\r\nCALSCALE:GREGORIAN\r\n';
  items.forEach((it,i)=>{ const nd=new Date(it.date.getTime()+864e5);
    s+='BEGIN:VEVENT\r\nUID:slate-'+i+'-'+fmt(it.date)+'@nabunan\r\nDTSTART;VALUE=DATE:'+fmt(it.date)+'\r\nDTEND;VALUE=DATE:'+fmt(nd)+'\r\nSUMMARY:'+it.title.replace(/[,;]/g,' ')+'\r\nEND:VEVENT\r\n'; });
  return s+'END:VCALENDAR';
}
function downloadICS(items){ const blob=new Blob([buildICS(items)],{type:'text/calendar'}); const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='stream-slate.ics'; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),2000); }

function kindLabel(k){ return {game:'Game',dlc:'DLC / Chapter',event:'Event',replay:'Replay'}[k]||'Game'; }
function basisLabel(b){ return {self:'Played it myself','remake-original':'From the original','series-avg':'Series average',estimate:'Rough estimate',calibrated:'Calibrated to my pace'}[b]||b; }
function shortDateFull(g){
  if(/^\d{4}-\d{2}-\d{2}$/.test(g.date)){ const d=anchor(g.date); return MO[d.getMonth()]+' '+d.getDate()+', '+d.getFullYear(); }
  if(/^\d{4}-\d{2}$/.test(g.date)){ const d=anchor(g.date); return MO_LONG[d.getMonth()]+' '+d.getFullYear(); }
  return g.dateLabel||g.date;
}

function defaultQueueIds(){

      </div>}

      {tab==='share' && <div className="anim">
        <div className="w-head"><h1>Share your schedule</h1><span>auto-built from your next streams — screenshot to post</span><button className="savebtn" style={{marginLeft:'auto'}} onClick={()=>downloadICS(upcoming.map(x=>({date:anchor(x.g.date),title:'🎮 '+x.g.title})))}>⤓ Add to Calendar (.ics)</button></div>
        <div className="share-stage">
          <div className="share-col">
            <div className="share-cap" style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>Twitch panel · 340px <button className="savebtn ghost" onClick={()=>savePNG('cardV','stream-slate-panel')}>↓ Save PNG</button></div>
            <div className="card-v" id="cardV" style={bold?{boxShadow:'0 24px 60px #0009, 0 0 0 1px '+launchColor+'66, 0 0 44px '+launchColor+'33'}:null}>
              <div className="cardv-top">
                <div style={{display:'flex',alignItems:'center',gap:9}}>
                  <div className="logo" style={{width:30,height:30,fontSize:'.95rem',boxShadow:'none',background:'#ffffff22'}}>S</div>
                  <div><div className="cardv-brandname">STREAM SLATE</div><div className="cardv-brandsub">@nabunan</div></div>
                </div>
                <div className="cardv-tag">WEEKLY</div>
              </div>
              <div className="cardv-next">
                <div className="cardv-nextart" style={{backgroundImage:'url('+(launchG.icon||'')+')'}}></div>
                <div style={{minWidth:0}}>
                  <div className="cardv-eyebrow">🌙 NEXT · MIDNIGHT LAUNCH</div>
                  <div className="cardv-title">{launchG.title}</div>
                  <div className="cardv-date">{MO[ld.getMonth()].toUpperCase()} {ld.getDate()} · in {cd_d}d {cd_h}h</div>
                </div>
              </div>
              <div className="cardv-list">
                {nextUp.map((n,i)=>(
                  <div className="cardv-row" key={i}>
                    <span className="cardv-chip">{n.date.toUpperCase()}</span>
                    <div className="cardv-rowart" style={{backgroundImage:'url('+n.art+')'}}></div>
                    <div className="cardv-rowtitle">{n.title}</div>
                    <span className="cardv-rowstr">{n.streams} str</span>
                  </div>
                ))}
              </div>
              <div className="cardv-foot">slate.nabunan.com</div>
            </div>
          </div>

          <div className="share-col">
            <div className="share-cap" style={{display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>Social / Discord banner · 680px <button className="savebtn ghost" onClick={()=>savePNG('cardW','stream-slate-banner')}>↓ Save PNG</button></div>
            <div className="card-w" id="cardW" style={bold?{boxShadow:'0 24px 60px #0009, 0 0 0 1px '+launchColor+'66, 0 0 44px '+launchColor+'33'}:null}>
              <div className="cardw-left">
                <div className="cardw-leftart" style={{backgroundImage:'url('+(launchG.icon||'')+')'}}></div>
                <div className="cardw-leftveil"></div>
                <div className="cardw-leftbody">
                  <div className="cardw-eyebrow">🌙 NEXT STREAM</div>
                  <div className="cardw-title">{launchG.title}</div>
                  <div className="cardw-date">{dow}, {MO[ld.getMonth()]} {ld.getDate()} · in {cd_d}d {cd_h}h</div>
                </div>
              </div>
              <div className="cardw-right">
                <div className="cardw-brand">
                  <div className="logo" style={{width:30,height:30,fontSize:'.95rem'}}>S</div>
                  <div><div className="cardv-brandname" style={{color:'#e8edf5'}}>STREAM SLATE</div><div className="brand-sub">@nabunan · weekly schedule</div></div>
                </div>
                {nextUp.slice(0,4).map((n,i)=>(
                  <div className="cardv-row" key={i}>
                    <span className="cardv-chip">{n.date.toUpperCase()}</span>
                    <div className="cardv-rowart" style={{backgroundImage:'url('+n.art+')'}}></div>
                    <div className="cardv-rowtitle">{n.title}</div>
                    <span className="cardv-rowstr">{n.streams} str</span>
                  </div>
                ))}
                <div className="cardw-foot">slate.nabunan.com · updated weekly from Twitch</div>
              </div>
            </div>
          </div>
        </div>
      </div>}

      {detail && <DetailModal game={detail} onClose={()=>setDetail(null)} />}
      {dayShow && <DayModal d={dayShow} onClose={()=>setDayShow(null)} />}

    </div></div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
