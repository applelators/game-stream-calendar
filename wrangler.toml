name = "game-stream-calendar"
main = "_worker.js"
compatibility_date = "2026-05-01"
compatibility_flags = ["nodejs_compat"]

# Keep the workers.dev URL alive alongside the custom domain.
workers_dev = true
# Custom subdomain on the nabunan.com Cloudflare zone (provisioned on deploy).
routes = [
  { pattern = "slate.nabunan.com", custom_domain = true }
]

[assets]
directory = "public"
binding = "ASSETS"

# Single-document persistence (games + settings) and the cached stream pace.
[[kv_namespaces]]
binding = "CALENDAR_KV"
id = "d6b88d74dc484129ae32424747f6a007"

# Twitch channel whose last-90-days stats drive the pace math.
[vars]
TWITCH_CHANNEL = "nabunan"

# Daily at 09:00 UTC ≈ 5am ET — refresh SullyGnome streams (lock in what was
# actually streamed each day) + the rolling pace. (~1h DST drift; close to 5am.)
[triggers]
crons = ["0 9 * * *"]
